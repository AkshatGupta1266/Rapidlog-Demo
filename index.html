<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | RapidLog by Xebia</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      overflow: hidden; /* No scrolling on login */
    }
    .login-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      width: 100vw;
    }
    .login-left {
      background: linear-gradient(135deg, rgba(21, 0, 39, 0.9), rgba(0, 0, 0, 0.9)), url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--spacing-7);
      position: relative;
    }
    .login-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: var(--spacing-7);
      background: var(--bg-primary);
    }
    .login-form-container {
      width: 100%;
      max-width: 400px;
    }
    .login-logo {
      position: absolute;
      top: var(--spacing-6);
      left: var(--spacing-6);
    }
    .hero-text {
      font-size: 64px;
      line-height: 1.1;
      font-weight: 700;
      margin-bottom: var(--spacing-4);
      background: linear-gradient(135deg, var(--text-primary), var(--color-purple-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero-subtext {
      font-size: 18px;
      color: var(--text-secondary);
      max-width: 80%;
      margin-bottom: var(--spacing-6);
    }
    .minimal-stats {
      display: flex;
      gap: var(--spacing-6);
      margin-top: var(--spacing-6);
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: var(--spacing-6);
    }
    .stat-item {
      display: flex;
      flex-direction: column;
    }
    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-left fade-up">
      <a href="dashboard.html" class="logo login-logo" style="text-decoration: none; user-select: none;">
        <img src="images/LOGO%20SVG.svg" alt="Xebia" style="height: 32px; pointer-events: none;" draggable="false" oncontextmenu="return false;">
        <span style="font-weight: 400; color: var(--text-secondary);">|</span>
        <span style="color: var(--text-primary);">RapidLog</span>
      </a>
      
      <div>
        <h1 class="hero-text">Compliance,<br>Simplified.</h1>
        <p class="hero-subtext">The high-fidelity intelligence terminal for enterprise compliance officers. Command your regulatory landscape with absolute clarity.</p>
        
        <div class="minimal-stats">
          <div class="stat-item">
            <span class="stat-value">99.9%</span>
            <span class="stat-label">Accuracy</span>
          </div>
          <div class="stat-item">
            <span class="stat-value">Real-time</span>
            <span class="stat-label">Telemetry</span>
          </div>
        </div>
      </div>
    </div>
    
    <div class="login-right fade-up stagger-1">
      <div class="login-form-container card card-glass">
        <h2 class="mb-2">Welcome Back</h2>
        <p class="text-secondary mb-6">Sign in to your RapidLog dashboard</p>
        
        <form action="dashboard.html" method="get">
          <div class="input-group mb-4">
            <label class="input-label" for="email">Enterprise Email</label>
            <input type="email" id="email" class="input-field" placeholder="name@xebia.com" required>
          </div>
          
          <div class="input-group mb-6">
            <label class="input-label" for="password">Password</label>
            <input type="password" id="password" class="input-field" placeholder="••••••••" required>
          </div>
          
          <button type="submit" class="btn btn-primary w-full">Access Terminal</button>
        </form>
        
        <div class="mt-6 text-center" style="margin-top: 24px;">
          <a href="#" class="caption">Forgot your credentials?</a>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
